name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    name: CLA Assistant
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: |
          github.event_name == 'pull_request_target' ||
          (
            github.event_name == 'issue_comment' &&
            (
              github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA.' ||
              github.event.comment.body == 'recheck'
            )
          )

        uses: contributor-assistant/github-action@v2.6.1

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          path-to-document: 'CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'

          allowlist: fad-schme,dependabot[bot],github-actions[bot],renovate[bot]
          # Message posted on the PR when one or more contributors have not signed.
          # Keep it welcoming and link directly to the sign-off instruction.
          custom-notsigned-prcomment: |
            Thank you for your contribution to UMA.

            Before we can review and merge this pull request, you must
            agree to the UMA Contributor License Agreement (CLA).

            **Please read the full agreement before signing:**
            👉 [CLA.md](../blob/main/CLA.md)


            **Once you have read the agreement, post this exact comment
            to confirm your acceptance:**

            ```
            I have read the CLA Document and I hereby sign the CLA
            ```

            By posting that statement you confirm:
            - You have read and agree to the terms in CLA.md
            - You are legally entitled to grant the rights described
            - Your signature will be recorded with your GitHub username,
              timestamp, and PR reference in signatures/cla.json

            If you believe you have already signed and are seeing this in error,
            post `recheck` as a comment and the bot will re-evaluate.

          # Message posted when all contributors on the PR have signed.
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you!
            This pull request is cleared for review.

          # The exact comment body a contributor must post to sign.
          # Must match the if-condition above and the instruction in
          # custom-notsigned-prcomment exactly.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA.'

          signed-commit-message: '$contributorName has signed the CLA in $owner/$repo#$pullRequestNo'

          create-file-commit-message: 'chore: initialize CLA signatures file'
